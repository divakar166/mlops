services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: fraud_mlflow
    command: >
      mlflow server
        --backend-store-uri postgresql://fraud:fraud@postgres:5432/fraud
        --default-artifact-root /mlruns
        --host 0.0.0.0
        --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraud_api
    env_file:
      - .env.api
    environment:
      DATABASE_URL: postgresql://fraud:fraud@postgres:5432/fraud
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REFERENCE_DATA_PATH: /app/data/train.csv
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: fraud_streamlit
    env_file:
      - .env.api
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "8501:8501"

volumes:
  pgdata:
